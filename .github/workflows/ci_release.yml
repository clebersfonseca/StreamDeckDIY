name: CI/CD — Testes & Auto Release

on:
  push:
    branches: [master]

# Impede execução simultânea
concurrency:
  group: ci-release
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════
  # Job 1: Rodar testes
  # ════════════════════════════════════════════════
  test:
    # Não roda em commits de bump automático
    if: "!contains(github.event.head_commit.message, '[auto-release]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do sistema (Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-cursor0

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          pytest tests/ -v --tb=short

  # ════════════════════════════════════════════════
  # Job 2: Criar release (só se testes passarem)
  # ════════════════════════════════════════════════
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Obter última versão e calcular próxima
        id: version
        run: |
          # Busca a tag mais recente no formato v*
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          echo "Última versão: $LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

          # Extrair e incrementar patch
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "Nova versão: $NEW_TAG"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Atualizar __version__ no código
        run: |
          sed -i 's/__version__ = ".*"/__version__ = "${{ steps.version.outputs.new_version }}"/' app/__init__.py
          echo "Versão atualizada para: $(grep __version__ app/__init__.py)"

      - name: Commit da nova versão
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/__init__.py
          git diff --cached --quiet && echo "Nenhuma mudança" && exit 0
          git commit -m "bump: versão ${{ steps.version.outputs.new_tag }} [auto-release]"
          git push

      - name: Criar tag
        run: |
          git tag -a ${{ steps.version.outputs.new_tag }} \
            -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Gerar changelog
        id: changelog
        run: |
          PREV_TAG=${{ steps.version.outputs.latest }}

          if [ "$PREV_TAG" = "v0.0.0" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD~1)
          fi

          # Salva changelog em arquivo (evita problemas com caracteres especiais)
          echo "$CHANGELOG" > /tmp/changelog.md

          # Preview
          echo "=== Changelog ==="
          cat /tmp/changelog.md

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.new_tag }} \
            --title "🚀 ${{ steps.version.outputs.new_tag }}" \
            --notes-file /tmp/changelog.md \
            --latest
